<!DOCTYPE html>
<html>
<head>
    <title>XLR8</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --card: #111111;
            --border: #1a1a1a;
            --input-bg: #111111;
            --input-border: #222222;
            --placeholder: #555555;
            --button-bg: #ffffff;
            --button-text: #000000;
            --button-hover: #dddddd;
            --nick-color: #888888;
            --status: #666666;
            --scroll: #222222;
            --scroll-hover: #333333;
        }

        [data-theme="light"] {
            --bg: #ffffff;
            --text: #000000;
            --card: #f5f5f5;
            --border: #e0e0e0;
            --input-bg: #f5f5f5;
            --input-border: #e0e0e0;
            --placeholder: #999999;
            --button-bg: #000000;
            --button-text: #ffffff;
            --button-hover: #333333;
            --nick-color: #666666;
            --status: #999999;
            --scroll: #cccccc;
            --scroll-hover: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            color: var(--text);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status {
            font-size: 12px;
            color: var(--status);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 28px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #cccccc;
            border-radius: 28px;
            transition: 0.3s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider {
            background: #10b981;
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 70%;
            padding: 14px 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            transition: background 0.3s, border 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .nick {
            font-size: 12px;
            font-weight: 600;
            color: var(--nick-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message .text {
            color: var(--text);
            transition: color 0.3s;
        }

        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #nickname, #msgInput {
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        #nickname {
            width: 140px;
        }

        #msgInput {
            flex: 1;
        }

        #nickname::placeholder, #msgInput::placeholder {
            color: var(--placeholder);
        }

        button {
            padding: 12px 24px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--button-hover);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        .empty-state {
            text-align: center;
            color: var(--placeholder);
            margin-top: 40px;
            font-size: 14px;
            transition: color 0.3s;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--scroll);
            border-radius: 3px;
            transition: background 0.3s;
        }

        #messages::-webkit-scrollbar-thumb:hover {
            background: var(--scroll-hover);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">XLR8</div>
        <div class="header-right">
            <div class="status">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
            <label class="toggle-switch">
                <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="messages">
        <div class="empty-state">Messages will appear here</div>
    </div>

    <div class="input-area">
        <input type="text" id="nickname" placeholder="Nickname" maxlength="20">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        var firstMessage = true;

        function toggleTheme() {
            var checkbox = document.getElementById('themeToggle');
            if (checkbox.checked) {
                document.body.setAttribute('data-theme', 'light');
            } else {
                document.body.removeAttribute('data-theme');
            }
        }

        socket.on('message', function(data) {
            if (firstMessage) {
                document.getElementById('messages').innerHTML = '';
                firstMessage = false;
            }

            var parts = data.split(': ');
            var nick = parts[0];
            var text = parts.slice(1).join(': ');

            var div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = '<div class="nick">' + nick + '</div><div class="text">' + text + '</div>';
            
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });

        function sendMessage() {
            var nick = document.getElementById('nickname').value.trim() || 'Guest';
            var msg = document.getElementById('msgInput').value.trim();
            if (msg) {
                socket.emit('message', nick + ': ' + msg);
                document.getElementById('msgInput').value = '';
            }
        }

        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        document.getElementById('msgInput').focus();
    </script>
</body>
</html>
