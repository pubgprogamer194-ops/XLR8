<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XLR8 - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #666666;
            text-align: center;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        input {
            width: 100%;
            padding: 16px 18px;
            background: #111111;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #333333;
            background: #141414;
        }
        input::placeholder {
            color: #555555;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover {
            background: #e0e0e0;
            transform: translateY(-1px);
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: #444444;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1a1a1a;
        }
        .divider::before { margin-right: 16px; }
        .divider::after { margin-left: 16px; }
        .google-btn {
            width: 100%;
            padding: 16px;
            background: #111111;
            color: #ffffff;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s;
        }
        .google-btn:hover {
            background: #1a1a1a;
            border-color: #2a2a2a;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            color: #555555;
            font-size: 14px;
        }
        .footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            opacity: 0.7;
        }
        
        /* Mobile fixes */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
                max-width: 100%;
            }
            .logo {
                font-size: 24px;
            }
            input, .submit-btn, .google-btn {
                padding: 14px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">XLR8</div>
        <div class="subtitle">Welcome back</div>
        
        <form method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit" class="submit-btn">Sign In</button>
        </form>
        
        <div class="divider">or</div>
        
        <a href="/google" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </a>
        
        <div class="footer">
            No account? <a href="/register">Create one</a>
        </div>
    </div>
</body>
</html>
