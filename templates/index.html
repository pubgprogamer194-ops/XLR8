<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XLR8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        
        body {
            overflow-x: hidden;
            width: 100vw;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }
        
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            min-height: 50px;
        }
        
        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .user-info img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            max-width: 95%;
            padding: 10px 14px;
            background: #111111;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            line-height: 1.4;
            font-size: 15px;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        
        .message .nick {
            font-size: 11px;
            font-weight: 600;
            color: #888888;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .message .text {
            color: #ffffff;
            font-size: 15px;
        }
        
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid #1a1a1a;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            background: #000000;
            min-height: 60px;
        }
        
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            min-height: 44px;
            -webkit-appearance: none;
        }
        
        button {
            padding: 12px 18px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            min-width: 60px;
            -webkit-appearance: none;
        }
        
        @media (max-width: 375px) {
            .logo { font-size: 16px; }
            .user-info { font-size: 12px; }
            .user-info img { width: 24px; height: 24px; }
            .message { max-width: 100%; padding: 8px 12px; }
            .message .text { font-size: 16px; }
            .message .nick { font-size: 10px; }
            #msgInput { font-size: 16px; padding: 10px 14px; }
            button { padding: 10px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">XLR8</div>
        <div class="user-info">
            {% if user.picture %}<<img src="{{ user.picture }}">{% endif %}
            <span>{{ user.name }}</span>
            <a href="/logout" style="color: #ffffff; text-decoration: none; font-size: 12px;">Logout</a>
        </div>
    </div>
    <div id="messages">
        {% for msg in messages %}
        <div class="message">
            <div class="nick">{{ msg.user_name }} · {{ msg.timestamp.strftime('%H:%M') }}</div>
            <div class="text">{{ msg.text }}</div>
        </div>
        {% endfor %}
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        socket.on('message', function(data) {
            var div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = '<div class="nick">' + data.name + ' · ' + data.time + '</div><div class="text">' + data.text + '</div>';
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
        function sendMessage() {
            var msg = document.getElementById('msgInput').value.trim();
            if (msg) { socket.emit('message', msg); document.getElementById('msgInput').value = ''; }
        }
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('msgInput').focus();
    </script>
</body>
</html>
