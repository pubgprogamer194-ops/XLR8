<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XLR8</title>
    <style>
        :root {
            --bg: #000000; --text: #ffffff; --card: #111111; --border: #1a1a1a;
            --input-bg: #111111; --input-border: #222222; --placeholder: #555555;
            --button-bg: #ffffff; --button-text: #000000; --button-hover: #dddddd;
            --nick-color: #888888; --status: #666666;
        }
        [data-theme="light"] {
            --bg: #ffffff; --text: #000000; --card: #f5f5f5; --border: #e0e0e0;
            --input-bg: #f5f5f5; --input-border: #e0e0e0; --placeholder: #999999;
            --button-bg: #000000; --button-text: #ffffff; --button-hover: #333333;
            --nick-color: #666666; --status: #999999;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text); height: 100vh;
            display: flex; flex-direction: column; transition: background 0.3s, color 0.3s;
            overflow: hidden;
        }
        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo { font-size: 20px; font-weight: 600; letter-spacing: 2px; color: var(--text); }
        .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .user-info img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }
        .message .nick {
            font-size: 11px;
            font-weight: 600;
            color: var(--nick-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .message .text { color: var(--text); font-size: 14px; }
        .input-area {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            background: var(--bg);
        }
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 20px;
            color: var(--text);
            font-size: 16px;
            outline: none;
            min-height: 44px;
        }
        button {
            padding: 12px 20px;
            background: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            min-height: 44px;
            min-width: 60px;
        }
        
        /* Mobile optimizations */
        @media (max-width: 480px) {
            .header {
                padding: 12px 16px;
            }
            .logo {
                font-size: 18px;
            }
            .user-info {
                font-size: 13px;
                gap: 8px;
            }
            .user-info img {
                width: 28px;
                height: 28px;
            }
            #messages {
                padding: 12px;
                gap: 8px;
            }
            .message {
                max-width: 90%;
                padding: 10px 14px;
                border-radius: 10px;
            }
            .message .nick {
                font-size: 10px;
            }
            .message .text {
                font-size: 15px;
            }
            .input-area {
                padding: 10px 12px;
                gap: 8px;
            }
            #msgInput {
                padding: 10px 14px;
                font-size: 16px;
                border-radius: 18px;
            }
            button {
                padding: 10px 16px;
                font-size: 13px;
                border-radius: 18px;
            }
        }
        
        /* Very small screens */
        @media (max-width: 360px) {
            .message {
                max-width: 95%;
            }
            .logo {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">XLR8</div>
        <div class="user-info">
            {% if user.picture %}<<img src="{{ user.picture }}">{% endif %}
            <span>{{ user.name }}</span>
            <a href="/logout" style="color: var(--text); text-decoration: none; font-size: 13px;">Logout</a>
        </div>
    </div>
    <div id="messages">
        {% for msg in messages %}
        <div class="message">
            <div class="nick">{{ msg.user_name }} · {{ msg.timestamp.strftime('%H:%M') }}</div>
            <div class="text">{{ msg.text }}</div>
        </div>
        {% endfor %}
    </div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        socket.on('message', function(data) {
            var div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = '<div class="nick">' + data.name + ' · ' + data.time + '</div><div class="text">' + data.text + '</div>';
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        });
        function sendMessage() {
            var msg = document.getElementById('msgInput').value.trim();
            if (msg) { socket.emit('message', msg); document.getElementById('msgInput').value = ''; }
        }
        document.getElementById('msgInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('msgInput').focus();
    </script>
</body>
</html>
